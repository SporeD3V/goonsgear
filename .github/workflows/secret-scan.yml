name: Secret scan

on:
  push:
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          # Scan only commits introduced by this push/PR to keep CI fast.
          # On the default branch, compare against the previous commit.
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: ${{ github.sha }}
          extra_args: >
            --only-verified
            --exclude-paths .trufflehog-ignore
