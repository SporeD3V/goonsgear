name: Deploy to staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STAGING_URL: https://goonsgear.macaw.studio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, curl, bcmath, gd
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend assets
        run: npm run build

      - name: Install Composer dependencies (no dev)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Build deploy folder
        run: |
          mkdir deploy
          rsync -avr \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="deploy" \
            --exclude=".env" \
            --exclude="storage/logs/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/cache/data/*" \
            --exclude="storage/framework/views/*" \
            ./ ./deploy
          # Remove vendor test files to reduce payload size
          find deploy/vendor -type d \( -name "tests" -o -name "Tests" \) -exec rm -rf {} + 2>/dev/null || true
          find deploy/vendor -type f \( -name "*.md" -o -name "*.txt" -o -name "LICENSE" -o -name "CHANGELOG*" \) -delete

      - name: Verify deploy payload
        run: |
          FILE_COUNT=$(find deploy -type f | wc -l)
          DIR_COUNT=$(find deploy -type d | wc -l)
          echo "Deploy payload has ${FILE_COUNT} files and ${DIR_COUNT} folders"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No files found in deploy payload. Aborting."
            exit 1
          fi

      # Deploy via SCP over SSH. The SSH user (spored3v) writes to the
      # site owner's directory (macaw-goonsgear) via REMOTE_PATH.
      - name: Deploy to staging via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSPHRASE }}
          source: "deploy/*"
          target: ${{ secrets.REMOTE_PATH }}
          strip_components: 1
          overwrite: true
          timeout: 600s

      - name: Post-deploy setup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          password: ${{ secrets.SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -eu
            cd '${{ secrets.REMOTE_PATH }}'

            echo "=== Post-deploy checks ==="

            echo "--- Fixing permissions ---"
            chmod -R 770 storage bootstrap/cache

            echo "--- PHP version ---"
            php -v | head -n 1

            if [ ! -f artisan ]; then
              echo "FAIL: artisan not found after deploy"
              exit 1
            fi

            echo "--- Laravel version ---"
            php artisan --version

            echo "--- Pending migrations ---"
            PENDING=$(php artisan migrate:status --no-interaction 2>&1 | grep -c 'Pending' || true)
            echo "Pending migrations: ${PENDING}"

            echo "--- Running migrations ---"
            php artisan migrate --force --no-interaction

            echo "--- Clearing caches ---"
            php artisan config:clear --no-interaction
            php artisan route:clear --no-interaction
            php artisan view:clear --no-interaction

            echo "--- Storage link ---"
            php artisan storage:link --force --no-interaction 2>/dev/null || true

            echo ""
            echo "=== Deploy OK ==="

      - name: Deployment summary
        run: |
          echo "=== Staging deployment completed ==="
          echo "Domain: ${STAGING_URL}"
          echo "Remote path: ${{ secrets.REMOTE_PATH }}"
          echo ""
          echo "Next steps if this is a fresh deploy:"
          echo "  1. Create .env on the server (SSH or file manager)"
          echo "  2. Create the database and update DB_* in .env"
          echo "  3. Run: php artisan migrate --force"
          echo "  4. Run: php artisan storage:link"