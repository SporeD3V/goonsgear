name: Deploy to staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, curl, bcmath, gd
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend assets
        run: npm run build

      - name: Install Composer dependencies (no dev)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Build deploy folder
        run: |
          mkdir deploy
          rsync -avr \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="deploy" \
            ./ ./deploy
          # Remove vendor test files to reduce payload size
          find deploy/vendor -type d \( -name "tests" -o -name "Tests" \) -exec rm -rf {} + 2>/dev/null || true
          find deploy/vendor -type f \( -name "*.md" -o -name "*.txt" -o -name "LICENSE" -o -name "CHANGELOG*" \) -delete

      - name: Verify deploy payload
        run: |
          FILE_COUNT=$(find deploy -type f | wc -l)
          DIR_COUNT=$(find deploy -type d | wc -l)
          echo "Deploy payload has ${FILE_COUNT} files and ${DIR_COUNT} folders"
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No files found in deploy payload. Aborting."
            exit 1
          fi

      - name: FTP Deploy to staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy/
          server-dir: /
          log-level: standard
          timeout: 600000