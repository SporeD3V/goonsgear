name: Deploy to staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      STAGING_URL: https://goonsgear.macaw.studio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce single deploy path
        run: |
          set -euo pipefail

          if find . -maxdepth 1 -type f \( -name 'deploy*.py' -o -name 'final_*.py' -o -name 'fix_staging*.py' \) | grep -q .; then
            echo "Ad hoc deploy scripts are not allowed. Use this workflow only."
            find . -maxdepth 1 -type f \( -name 'deploy*.py' -o -name 'final_*.py' -o -name 'fix_staging*.py' \) -print
            exit 1
          fi

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, curl, bcmath, gd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/composer-cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate Composer manifest
        run: composer validate --strict --no-check-publish

      - name: Install Composer dependencies
        env:
          COMPOSER_CACHE_DIR: ${{ runner.temp }}/composer-cache
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Code style check (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Run release gate tests
        run: |
          php artisan test --compact \
            tests/Feature/ShopBrowseTest.php \
            tests/Feature/ShopProductPresentationTest.php \
            tests/Feature/CartFlowTest.php \
            tests/Feature/CheckoutFlowTest.php \
            tests/Feature/LegacyImportCommandTest.php \
            tests/Feature/ShopPaginationTest.php

      - name: Build frontend assets
        run: npm run build

      - name: Optimize Composer dependencies for deploy
        env:
          COMPOSER_CACHE_DIR: ${{ runner.temp }}/composer-cache
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Generate release marker
        run: |
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > public/release.json <<EOF
          {
            "source": "github-actions",
            "commit": "${GITHUB_SHA}",
            "ref": "${GITHUB_REF_NAME}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "released_at": "${RELEASED_AT}"
          }
          EOF
          sed -i 's/^[[:space:]]*//' public/release.json

      - name: Build deploy folder
        run: |
          mkdir deploy
          rsync -avr \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="tests" \
            --exclude="deploy" \
            --exclude=".env" \
            --exclude="bootstrap/cache/*.php" \
            --exclude="storage/logs/*" \
            --exclude="storage/framework/sessions/*" \
            --exclude="storage/framework/cache/data/*" \
            --exclude="storage/framework/views/*" \
            ./ ./deploy
          find deploy/vendor -type d \( -name "tests" -o -name "Tests" \) -exec rm -rf {} + 2>/dev/null || true
          find deploy/vendor -type f \( -name "*.md" -o -name "*.txt" -o -name "LICENSE" -o -name "CHANGELOG*" \) -delete

      - name: Verify deploy payload
        run: |
          set -euo pipefail

          FILE_COUNT=$(find deploy -type f | wc -l)
          DIR_COUNT=$(find deploy -type d | wc -l)
          echo "Deploy payload has ${FILE_COUNT} files and ${DIR_COUNT} folders"

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "No files found in deploy payload. Aborting."
            exit 1
          fi

          for required in artisan vendor/autoload.php public/release.json public/index.php; do
            if [ ! -f "deploy/${required}" ]; then
              echo "FAIL: deploy/${required} missing from payload"
              exit 1
            fi
          done

      - name: Install SSH deploy tooling
        run: |
          if ! command -v sshpass &>/dev/null; then
            sudo apt-get update
            sudo apt-get install -y sshpass
          fi
          sshpass -V

      - name: Trust staging host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Prepare staging cache directories
        env:
          SSHPASS: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          sshpass -e ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s -- '${{ secrets.REMOTE_PATH }}' <<'REMOTE_SCRIPT'
          set -eu
          REMOTE_PATH="$1"
          test -d "$REMOTE_PATH"
          touch "$REMOTE_PATH/.deploy-write-test"
          rm -f "$REMOTE_PATH/.deploy-write-test"
          mkdir -p "$REMOTE_PATH/bootstrap/cache" "$REMOTE_PATH/storage"
          find "$REMOTE_PATH/bootstrap/cache" -maxdepth 1 -type f -name '*.php' -delete || true
          chmod -R ug+rwX "$REMOTE_PATH/storage" "$REMOTE_PATH/bootstrap/cache" || true
          REMOTE_SCRIPT

      - name: Deploy to staging via rsync
        env:
          SSHPASS: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          export RSYNC_RSH="sshpass -e ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=yes"
          rsync -rltz --delete --force --omit-dir-times --stats \
            --exclude='.env' \
            --exclude='storage/' \
            --exclude='bootstrap/cache/' \
            deploy/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.REMOTE_PATH }}/"

      - name: Post-deploy setup
        env:
          SSHPASS: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          set -euo pipefail

          sshpass -e ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -s -- '${{ secrets.REMOTE_PATH }}' <<'REMOTE_SCRIPT'
          set -eu
          REMOTE_PATH="$1"
          cd "$REMOTE_PATH"

          echo '=== Post-deploy checks ==='

          echo '--- Fixing permissions ---'
          find storage bootstrap/cache -type d -exec chmod 770 {} + 2>/dev/null || true
          find storage bootstrap/cache -type f -exec chmod 660 {} + 2>/dev/null || true

          echo '--- PHP version ---'
          php -v | head -n 1

          if [ ! -f artisan ]; then
            echo 'FAIL: artisan not found after deploy'
            exit 1
          fi

          echo '--- Laravel version ---'
          php artisan --version

          echo '--- Release marker ---'
          if [ ! -f public/release.json ]; then
            echo 'FAIL: public/release.json not found after deploy'
            exit 1
          fi
          cat public/release.json

          echo '--- Environment ---'
          ABOUT_OUTPUT=$(php artisan about --only=environment 2>/dev/null || php artisan about 2>/dev/null)
          echo "$ABOUT_OUTPUT"
          if echo "$ABOUT_OUTPUT" | grep -Eq 'Debug Mode[ .]*ENABLED'; then
            echo 'FAIL: APP_DEBUG must be disabled on staging.'
            exit 1
          fi

          echo '--- Pending migrations ---'
          PENDING=$(php artisan migrate:status --no-interaction 2>&1 | grep -c 'Pending' || true)
          echo "Pending migrations: ${PENDING}"

          echo '--- Running migrations ---'
          php artisan migrate --force --no-interaction

          echo '--- Verifying no pending migrations ---'
          REMAINING=$(php artisan migrate:status --no-interaction 2>&1 | grep -c 'Pending' || true)
          if [ "$REMAINING" -gt 0 ]; then
            echo "FAIL: ${REMAINING} migration(s) still pending after migrate. Aborting deploy."
            php artisan migrate:status --no-interaction
            exit 1
          fi
          echo 'All migrations applied successfully.'

          echo '--- One-time backfill: media variant paths ---'
          php artisan media:backfill-variant-paths --no-interaction
          echo 'Backfill complete.'

          echo '--- Clearing caches ---'
          php artisan optimize:clear --no-interaction

          echo '--- Storage link ---'
          php artisan storage:link --force --no-interaction 2>/dev/null || true

          echo '--- Rebuilding caches ---'
          php artisan optimize --no-interaction

          echo
          echo '=== Deploy OK ==='
          REMOTE_SCRIPT

      - name: Smoke test staging
        run: |
          set -euo pipefail

          for path in / /catalog /cart; do
            code=$(curl -sS -o /tmp/response -w '%{http_code}' "${STAGING_URL}${path}")
            echo "${path} -> ${code}"
            if [ "$code" -ne 200 ]; then
              echo "FAIL: ${path} returned ${code}"
              exit 1
            fi
          done

          SEARCH_RESPONSE=$(curl -sS "${STAGING_URL}/api/shop/search?q=sh")
          echo "$SEARCH_RESPONSE"
          echo "$SEARCH_RESPONSE" | grep -F '"results"' >/dev/null || {
            echo 'FAIL: search endpoint smoke test failed'
            exit 1
          }

          RELEASE_JSON=$(curl -sS "${STAGING_URL}/release.json")
          echo "$RELEASE_JSON"
          RELEASE_COMMIT=$(echo "$RELEASE_JSON" | grep -o '"commit" *: *"[^"]*"' | cut -d'"' -f4)
          if [ "$RELEASE_COMMIT" != "$GITHUB_SHA" ]; then
            echo "FAIL: release marker commit ${RELEASE_COMMIT} does not match ${GITHUB_SHA}"
            exit 1
          fi

      - name: Deployment summary
        run: |
          echo "=== Staging deployment completed ==="
          echo "Domain: ${STAGING_URL}"
          echo "Remote path: ${{ secrets.REMOTE_PATH }}"
